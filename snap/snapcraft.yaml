name: ponto-crz
base: core24
icon: snap/gui/ponto-crz.png
title: PontoCrz
version: '1.0.1'
license: MIT
contact: https://github.com/erascardsilva/pontoCrz/issues
website: https://github.com/erascardsilva/pontoCrz
summary: Transforme fotos em gráficos de ponto cruz
description: |
  PontoCrz é uma ferramenta para transformar suas fotos favoritas em 
  gráficos técnicos de ponto cruz (cross stitch).
  Escolha a largura em pontos, a quantidade de cores DMC e salve em JPG
  pronto para imprimir e bordar à mão.

grade: stable
confinement: strict

apps:
  ponto-crz:
    command: bin/pontoCrz
    extensions: [gnome]
    plugs:
      - home
      - network
      - desktop
      - desktop-legacy
      - x11
      - wayland

parts:
  app:
    plugin: dump
    source: build/bin/
    organize:
      pontoCrz: bin/pontoCrz
  icons:
    plugin: nil
    override-prime: |
      mkdir -p $SNAPCRAFT_PRIME/usr/share/pixmaps
      cp $SNAPCRAFT_PROJECT_DIR/snap/gui/ponto-crz.png $SNAPCRAFT_PRIME/usr/share/pixmaps/ponto-crz.png
      mkdir -p $SNAPCRAFT_PRIME/usr/share/icons/hicolor/256x256/apps
      cp $SNAPCRAFT_PROJECT_DIR/snap/gui/ponto-crz.png $SNAPCRAFT_PRIME/usr/share/icons/hicolor/256x256/apps/ponto-crz.png
      mkdir -p $SNAPCRAFT_PRIME/meta/gui/icons/hicolor/256x256/apps
      cp $SNAPCRAFT_PROJECT_DIR/snap/gui/ponto-crz.png $SNAPCRAFT_PRIME/meta/gui/icons/hicolor/256x256/apps/snap.ponto-crz.png
      cat > $SNAPCRAFT_PRIME/meta/gui/icons/hicolor/index.theme << 'EOF'
[Icon Theme]
Name=hicolor
Comment=Hicolor Icon Theme
Directories=256x256/apps

[256x256/apps]
Size=256
Type=Fixed
EOF
